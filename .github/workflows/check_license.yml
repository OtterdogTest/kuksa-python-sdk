name: spdx

on:
  pull_request

concurrency:
      group: ${{ github.ref }}-${{ github.workflow }}
      cancel-in-progress: true

jobs:
  check-spdx-headers:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        # required to grab the history of the PR
        fetch-depth: 0
        submodules: 'true'

    - name: Get changed files
      run: |
        echo "files=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} | tr '\n' ',')" >> $GITHUB_ENV

    - name: Set license
      run: |
        echo "licenses=Apache-2.0" >> $GITHUB_ENV

    - uses: eclipse-kuksa/kuksa-actions/spdx@c0ff118be949dd65e2286d33703c9f97c0652485 # 2
      with:
        files: "${{ env.files }}"
        licenses: "${{ env.licenses }}"
