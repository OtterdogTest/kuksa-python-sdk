name: Github Release and PyPi Publish

on:
  workflow_dispatch:
  push:
   tags:
     - "*.*.*"

jobs:
  build:
    name: Build distribution and publish 🐍 to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/kuksa-client

    permissions:
      id-token: write
      contents: write

    steps:
    - name: Checkout kuksa-python-sdk
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        submodules: 'true'
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: "3.10"
    - name: Install dependencies with pip
      run: |
        cd kuksa-client
        pip install -r requirements.txt
        pip install -e .
    - name: Install pypa/build
      run: pip install build --user
    - name: Build for PyPI
      run: |
        cd kuksa-client
        python3 -m build
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
      with:
        packages-dir: kuksa-client/dist
    - name: Create draft release
      id: create_release
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
      with:
        draft: true
        name: KUKSA Python SDK ${{ github.ref_name }}
